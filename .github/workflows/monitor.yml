name: Recruitment Monitor

on:
  schedule:
    # 每 15 分钟运行一次 (GitHub 允许的最快频率通常是 5-15 分钟)
    - cron: '*/15 * * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 设置 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 安装依赖
      run: |
        pip install -r requirements.txt

    - name: 运行监控脚本
      env:
        # 将敏感信息设为环境变量
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python m.py
