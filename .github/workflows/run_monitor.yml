name: Recruitment Monitor

on:
  schedule:
    - cron: '*/20 * * * *' # 每 20 分钟运行一次
  workflow_dispatch:      # 允许手动运行

# 必须赋予写权限，否则无法更新 .txt 文件
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4

      - name: 运行监控脚本
        env:
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python m.py

      - name: 提交并推送记录更新
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Action"
          git add last_job_record.txt
          # 检查是否有文件变动，有则提交推送
          if ! git diff --cached --quiet; then
            git commit -m "Update monitor record [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
